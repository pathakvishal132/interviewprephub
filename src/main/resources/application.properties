spring.application.name=backend
# API Keys
api.key=${GEMINI_API_KEY}
db.key=${DB_KEY}


# Database (Postgres on Supabase)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.properties.hibernate.statement_cache.size=32
spring.jpa.properties.hibernate.query.plan_cache_max_size=64


spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=HikariCP


logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email Configuration (Brevo HTTP API — SMTP is blocked on Render)
# Disable Spring Mail auto-config since we use Brevo HTTP API directly
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
brevo.api-key=${BREVO_API_KEY}
mail.from=${MAIL_FROM}
mail.from-name=${MAIL_FROM_NAME:InterviewPrepHub}

# Frontend URL for email links
FRONTEND_URL=${FRONTEND_URL}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
